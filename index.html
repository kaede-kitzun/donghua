<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renegade Immortal - Episodes</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            color: #1e293b;
        }

        /* Main Container */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Header Section */
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            padding: 24px 20px;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: white;
        }

        .logo span {
            font-size: 12px;
            font-weight: 500;
            color: #94a3b8;
            display: block;
            margin-top: 2px;
        }

        .join-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .join-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Profile Card - Lightweight */
        .profile-card {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 8px;
        }

        .profile-avatar {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(59,130,246,0.3);
        }

        .profile-info {
            flex: 1;
        }

        .welcome-tag {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .profile-name {
            font-weight: 700;
            font-size: 18px;
            color: white;
            margin-bottom: 2px;
        }

        .profile-username {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: white;
            border-radius: 20px;
            margin: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-weight: 800;
            font-size: 20px;
            color: #0f172a;
        }

        .stat-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* Search Section */
        .search-section {
            padding: 0 20px 20px;
        }

        .search-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 14px 18px;
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: #1e293b;
            transition: all 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .search-box::placeholder {
            color: #94a3b8;
        }

        /* Episodes Section */
        .episodes-section {
            padding: 0 20px 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-weight: 700;
            font-size: 18px;
            color: #0f172a;
        }

        .episode-count {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #475569;
        }

        /* Episode Grid - Optimized Grid Layout */
        .episode-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        /* Episode Card - No Images, Just Text */
        .episode-card {
            background: white;
            border: 1px solid #f1f5f9;
            border-radius: 16px;
            padding: 16px 8px;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .episode-card:active {
            transform: scale(0.96);
            background: #f8fafc;
            border-color: #3b82f6;
        }

        .episode-number {
            font-weight: 800;
            font-size: 20px;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .episode-label {
            font-size: 10px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Modal - Optimized */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.98);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 28px 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-icon {
            width: 64px;
            height: 64px;
            border-radius: 32px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 24px;
            font-weight: 700;
        }

        .modal-title {
            font-weight: 700;
            font-size: 22px;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .modal-episode {
            font-size: 14px;
            color: #3b82f6;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .modal-steps {
            margin: 24px 0;
            text-align: left;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            color: #475569;
            font-size: 14px;
            font-weight: 500;
        }

        .step-number {
            width: 28px;
            height: 28px;
            border-radius: 14px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            color: #0f172a;
        }

        .step.active .step-number {
            background: #3b82f6;
            color: white;
        }

        .modal-btn {
            background: #0f172a;
            color: white;
            border: none;
            padding: 18px 24px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .modal-btn:active {
            background: #1e293b;
            transform: scale(0.98);
        }

        .modal-btn.secondary {
            background: #f1f5f9;
            color: #475569;
        }

        .modal-btn.secondary:active {
            background: #e2e8f0;
        }

        .timer {
            font-weight: 700;
            color: #3b82f6;
            font-size: 18px;
            margin: 16px 0;
        }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 3px solid #f1f5f9;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            color: #64748b;
            font-size: 14px;
            line-height: 1.6;
            margin: 16px 0;
        }

        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            margin-top: 16px;
            cursor: pointer;
            padding: 8px;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
            font-weight: 500;
            grid-column: span 4;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-top">
                <div class="logo">
                    <h1>RENEGADE</h1>
                    <span>IMMORTAL • සිංහල</span>
                </div>
                <a href="https://t.me/renegade_immortal_sinhala" target="_blank" class="join-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm5.891 8.146l-2.003 9.464c-.149.659-.541.823-1.091.515l-3.051-2.248-1.472 1.417c-.163.163-.3.299-.614.299l.219-3.107 5.654-5.107c.246-.219-.054-.341-.381-.123l-6.991 4.4-3.012-.942c-.655-.205-.667-.655.137-.968l11.771-4.535c.544-.203 1.02.123.864.888z"/>
                    </svg>
                    JOIN
                </a>
            </div>

            <!-- Profile Card - No Images -->
            <div id="profileCard" class="profile-card" style="display: none;">
                <div id="profileAvatar" class="profile-avatar"></div>
                <div class="profile-info">
                    <div class="welcome-tag">WELCOME BACK</div>
                    <div id="profileName" class="profile-name"></div>
                    <div id="profileUsername" class="profile-username"></div>
                </div>
            </div>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value">32</div>
                <div class="stat-label">EPISODES</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">HD</div>
                <div class="stat-label">QUALITY</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">සිං</div>
                <div class="stat-label">SUBTITLES</div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <input type="number" id="searchInput" class="search-box" placeholder="🔍 Search episode number..." onkeyup="filterEpisodes()">
        </div>

        <!-- Episodes Section -->
        <div class="episodes-section">
            <div class="section-header">
                <h2 class="section-title">Available Episodes</h2>
                <span class="episode-count" id="episodeCount">32</span>
            </div>
            <div class="episode-grid" id="episodeGrid"></div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">🎬</div>
            <div class="modal-title" id="modalTitle">Unlock Episode</div>
            <div class="modal-episode" id="modalEpisode"></div>
            
            <div class="modal-steps" id="modalSteps">
                <div class="step active" id="step1">
                    <div class="step-number">1</div>
                    <div>Watch first ad</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-number">2</div>
                    <div>Complete verification</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-number">3</div>
                    <div>Get video</div>
                </div>
            </div>

            <div id="statusMessage" class="status-text"></div>
            <div id="timer" class="timer"></div>
            <div id="loader" class="loader"></div>

            <button id="actionBtn" class="modal-btn">Start</button>
            <button id="closeModalBtn" class="close-btn" onclick="closeModal()">Watch Later</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Configuration
        const AD_LINK_1 = "https://omg10.com/4/10547747";
        const AD_LINK_2 = "https://omg10.com/4/10547724";
        let currentEpisode = null;
        let currentStep = 1;

        // Get user data from URL
        function getUserData() {
            const params = new URLSearchParams(window.location.search);
            return {
                userId: params.get('user_id'),
                firstName: params.get('first_name'),
                username: params.get('username')
            };
        }

        // Show profile card
        function showProfile() {
            const userData = getUserData();
            if (userData.firstName) {
                const profileCard = document.getElementById('profileCard');
                const profileAvatar = document.getElementById('profileAvatar');
                const profileName = document.getElementById('profileName');
                const profileUsername = document.getElementById('profileUsername');

                // Set avatar with first letter
                profileAvatar.textContent = userData.firstName.charAt(0).toUpperCase();
                
                // Set name
                profileName.textContent = userData.firstName;
                
                // Set username
                if (userData.username) {
                    profileUsername.textContent = '@' + userData.username;
                } else {
                    profileUsername.textContent = 'Telegram User';
                }

                profileCard.style.display = 'flex';
            }
        }

        // Generate episodes (104 to 135)
        function generateEpisodes() {
            const grid = document.getElementById('episodeGrid');
            const startEp = 104;
            const endEp = 135;
            
            grid.innerHTML = '';
            
            for (let i = startEp; i <= endEp; i++) {
                const card = document.createElement('div');
                card.className = 'episode-card';
                card.setAttribute('data-episode', i);
                card.onclick = () => openModal(i);
                
                card.innerHTML = `
                    <div class="episode-number">${i}</div>
                    <div class="episode-label">EPISODE</div>
                `;
                
                grid.appendChild(card);
            }
            
            // Update episode count
            document.getElementById('episodeCount').textContent = endEp - startEp + 1;
        }

        // Filter episodes
        function filterEpisodes() {
            const searchValue = document.getElementById('searchInput').value;
            const cards = document.querySelectorAll('.episode-card');
            let visibleCount = 0;
            
            cards.forEach(card => {
                const epNumber = card.getAttribute('data-episode');
                if (epNumber.includes(searchValue)) {
                    card.style.display = 'block';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });
            
            document.getElementById('episodeCount').textContent = visibleCount;
        }

        // Modal functions
        function openModal(episode) {
            currentEpisode = episode;
            currentStep = 1;
            
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalEpisode').textContent = `Episode ${episode}`;
            
            updateStepUI(1);
            showStep1();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            resetModal();
        }

        function resetModal() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            document.getElementById('timer').innerHTML = '';
            document.getElementById('actionBtn').style.display = 'block';
        }

        function updateStepUI(step) {
            for (let i = 1; i <= 3; i++) {
                const stepEl = document.getElementById(`step${i}`);
                if (i <= step) {
                    stepEl.classList.add('active');
                } else {
                    stepEl.classList.remove('active');
                }
            }
        }

        function showStep1() {
            const actionBtn = document.getElementById('actionBtn');
            const statusMsg = document.getElementById('statusMessage');
            
            actionBtn.style.display = 'block';
            actionBtn.textContent = 'Watch Ad 1/3';
            statusMsg.innerHTML = 'Watch first ad to continue';
            
            actionBtn.onclick = () => {
                window.open(AD_LINK_1, '_blank');
                showLoader('Preparing next step...');
                startTimer(5, showStep2);
            };
        }

        function showStep2() {
            currentStep = 2;
            updateStepUI(2);
            
            const actionBtn = document.getElementById('actionBtn');
            const statusMsg = document.getElementById('statusMessage');
            
            actionBtn.style.display = 'block';
            actionBtn.textContent = 'Verify Now';
            statusMsg.innerHTML = 'Complete quick verification';
            
            actionBtn.onclick = () => {
                showLoader('Verifying...');
                startTimer(3, showStep3);
            };
        }

        function showStep3() {
            currentStep = 3;
            updateStepUI(3);
            
            const actionBtn = document.getElementById('actionBtn');
            const statusMsg = document.getElementById('statusMessage');
            
            actionBtn.style.display = 'block';
            actionBtn.textContent = 'Watch Final Ad';
            statusMsg.innerHTML = 'One last step to unlock';
            
            actionBtn.onclick = () => {
                window.open(AD_LINK_2, '_blank');
                showLoader('Finalizing...');
                startTimer(3, finalStep);
            };
        }

        function finalStep() {
            const actionBtn = document.getElementById('actionBtn');
            const statusMsg = document.getElementById('statusMessage');
            
            document.getElementById('loader').style.display = 'none';
            actionBtn.style.display = 'block';
            actionBtn.textContent = 'GET VIDEO';
            statusMsg.innerHTML = '✅ Ready to watch!';
            
            actionBtn.onclick = () => {
                tg.sendData(JSON.stringify({ 
                    action: "get_video", 
                    ep_id: currentEpisode.toString() 
                }));
                tg.close();
            };
        }

        function showLoader(message) {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('actionBtn').style.display = 'none';
            document.getElementById('statusMessage').innerHTML = message;
        }

        function startTimer(seconds, callback) {
            let timeLeft = seconds;
            const timerDisplay = document.getElementById('timer');
            
            timerDisplay.style.display = 'block';
            timerDisplay.innerHTML = `⏳ ${timeLeft}s`;
            
            const interval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerHTML = `⏳ ${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    timerDisplay.style.display = 'none';
                    document.getElementById('loader').style.display = 'none';
                    callback();
                }
            }, 1000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            generateEpisodes();
            showProfile();
            
            // Hide any ad scripts if they cause lag
            try {
                // Optional: disable heavy animations if needed
            } catch(e) {}
        });
    </script>
</body>
</html>
