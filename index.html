<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renegade Immortal - Episodes</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --neon: #00ff88;
            --accent: #00d4ff;
            --bg-dark: #020406;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-light: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(106, 17, 203, 0.2) 0%, rgba(37, 117, 252, 0.2) 100%);
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .main-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 28px;
            background: linear-gradient(180deg, #fff 40%, var(--neon) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.8;
            color: var(--neon);
        }

        /* Search Bar */
        .search-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 15px 20px 15px 50px;
            border-radius: 15px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--neon);
            background: var(--glass-light);
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon);
            font-size: 18px;
        }

        /* Stats */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 12px;
            color: var(--neon);
            letter-spacing: 1px;
        }

        .episode-count {
            background: var(--glass);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            color: white;
        }

        /* Episode Grid */
        .ep-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .ep-tab {
            background: var(--glass);
            border: 1px solid var(--border);
            height: 80px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .ep-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .ep-tab:hover::before {
            left: 100%;
        }

        .ep-tab:active {
            transform: scale(0.95);
        }

        .ep-tab.unlocked {
            border-color: var(--neon);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .ep-number {
            font-size: 24px;
            font-weight: 900;
        }

        .ep-status {
            font-size: 10px;
            margin-top: 5px;
            color: var(--neon);
        }

        /* Modal */
        #ad-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
            padding: 20px;
        }

        .modal-card {
            background: #0a0a0a;
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: var(--neon);
            font-size: 22px;
            margin-bottom: 5px;
            font-weight: 900;
        }

        .ep-badge {
            background: var(--glass);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            border: 1px solid var(--border);
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            padding: 0 10px;
        }

        .step-dot {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--glass);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 900;
            transition: all 0.3s;
        }

        .step-dot.completed {
            background: var(--neon);
            border-color: var(--neon);
            color: black;
        }

        .step-dot.active {
            border-color: var(--neon);
            box-shadow: 0 0 15px var(--neon);
        }

        .status-text {
            font-size: 15px;
            margin: 20px 0;
            line-height: 1.6;
            min-height: 60px;
        }

        .action-btn {
            background: linear-gradient(90deg, var(--neon), var(--accent));
            color: black;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.3);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .close-btn {
            background: none;
            border: none;
            color: gray;
            margin-top: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .loader {
            display: none;
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--neon);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .timer-display {
            font-size: 24px;
            font-weight: 900;
            color: var(--accent);
            margin: 10px 0;
            font-family: monospace;
        }

        .success-message {
            color: var(--neon);
            font-size: 18px;
            margin: 15px 0;
            display: none;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: gray;
            font-size: 16px;
        }

        @media (min-width: 768px) {
            .ep-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="main-title">RENEGADE IMMORTAL</h1>
            <div class="subtitle">සිංහල උපසිරැසි සමඟ</div>
        </div>

        <!-- Search -->
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="Search episode number..." onkeyup="filterEpisodes()">
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <span>📋 AVAILABLE EPISODES</span>
            <span class="episode-count" id="epCount">104-135</span>
        </div>

        <!-- Episode Grid -->
        <div class="ep-grid" id="epGrid"></div>
    </div>

    <!-- Unlock Modal -->
    <div id="adModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>🔓 UNLOCK VIDEO</h2>
                <div class="ep-badge" id="modalEpisode">Episode 00</div>
            </div>
            
            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-dot" id="step1">1</div>
                <div class="step-dot" id="step2">2</div>
                <div class="step-dot" id="step3">3</div>
            </div>
            
            <!-- Status -->
            <div id="modalStatus" class="status-text">වීඩියෝව ලබා ගැනීමට පියවර අනුගමනය කරන්න.</div>
            
            <!-- Loader -->
            <div id="modalLoader" class="loader"></div>
            
            <!-- Timer -->
            <div id="timerDisplay" class="timer-display"></div>
            
            <!-- Success -->
            <div id="successMessage" class="success-message">✅ සාර්ථකයි!</div>
            
            <!-- Action Button -->
            <button id="actionBtn" class="action-btn">ආරම්භ කරන්න</button>
            <button id="closeModalBtn" class="close-btn" onclick="closeModal()">පසුව බලන්න</button>
        </div>
    </div>

    <script>
        // ==================== TELEGRAM INIT ====================
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ==================== CONFIG ====================
        const AD_LINK_1 = "https://omg10.com/4/10547747";  // First ad link
        const AD_LINK_2 = "https://omg10.com/4/10547724";  // Second ad link
        const START_EP = 104;
        const END_EP = 135;

        let currentEpisode = null;
        let currentStep = 1;
        let unlockedEpisodes = new Set();

        // ==================== LOAD UNLOCKED EPISODES ====================
        try {
            const saved = localStorage.getItem('renegade_unlocked');
            if (saved) {
                unlockedEpisodes = new Set(JSON.parse(saved));
                console.log('Loaded unlocked:', unlockedEpisodes);
            }
        } catch(e) {
            console.error('Error loading saved episodes:', e);
        }

        // ==================== SAVE UNLOCKED EPISODES ====================
        function saveUnlockedEpisodes() {
            try {
                localStorage.setItem('renegade_unlocked', JSON.stringify([...unlockedEpisodes]));
            } catch(e) {
                console.error('Error saving:', e);
            }
        }

        // ==================== GENERATE EPISODES ====================
        function generateEpisodes() {
            const grid = document.getElementById('epGrid');
            grid.innerHTML = '';

            for (let i = START_EP; i <= END_EP; i++) {
                const epNumber = i;
                const epId = `EP${String(i).padStart(2, '0')}`;
                
                const card = document.createElement('div');
                card.className = 'ep-tab';
                if (unlockedEpisodes.has(epNumber.toString())) {
                    card.classList.add('unlocked');
                }
                card.id = `ep-${epNumber}`;
                card.dataset.epNumber = epNumber;
                card.dataset.epId = epId;
                
                card.innerHTML = `
                    <span class="ep-number">${epNumber}</span>
                    <span class="ep-status">${unlockedEpisodes.has(epNumber.toString()) ? 'UNLOCKED' : 'LOCKED'}</span>
                `;
                
                card.onclick = () => openModal(epNumber);
                grid.appendChild(card);
            }
            
            document.getElementById('epCount').textContent = `${START_EP}-${END_EP}`;
        }

        // ==================== FILTER EPISODES ====================
        function filterEpisodes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.ep-tab');
            let visibleCount = 0;

            cards.forEach(card => {
                const epNumber = card.dataset.epNumber;
                if (epNumber.includes(searchTerm)) {
                    card.style.display = 'flex';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            // Show no results message
            const existingMsg = document.querySelector('.no-results');
            if (visibleCount === 0) {
                if (!existingMsg) {
                    const msg = document.createElement('div');
                    msg.className = 'no-results';
                    msg.textContent = '❌ කිසිදු කථාංගයක් හමු නොවුණි';
                    document.getElementById('epGrid').appendChild(msg);
                }
            } else {
                if (existingMsg) existingMsg.remove();
            }
        }

        // ==================== MODAL FUNCTIONS ====================
        function openModal(epNumber) {
            currentEpisode = epNumber;
            document.getElementById('modalEpisode').textContent = `Episode ${epNumber}`;
            document.getElementById('adModal').style.display = 'flex';
            resetModal();
            startStep1();
        }

        function closeModal() {
            document.getElementById('adModal').style.display = 'none';
            resetModal();
        }

        function resetModal() {
            currentStep = 1;
            document.getElementById('step1').className = 'step-dot active';
            document.getElementById('step2').className = 'step-dot';
            document.getElementById('step3').className = 'step-dot';
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('timerDisplay').textContent = '';
            hideLoader();
        }

        function updateSteps(step) {
            const steps = [1, 2, 3].map(i => document.getElementById(`step${i}`));
            steps.forEach((dot, index) => {
                dot.className = 'step-dot';
                if (index + 1 < step) {
                    dot.classList.add('completed');
                } else if (index + 1 === step) {
                    dot.classList.add('active');
                }
            });
        }

        function showLoader(text) {
            document.getElementById('modalLoader').style.display = 'block';
            document.getElementById('modalStatus').textContent = text;
            document.getElementById('actionBtn').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function hideLoader() {
            document.getElementById('modalLoader').style.display = 'none';
            document.getElementById('actionBtn').style.display = 'block';
        }

        function runTimer(seconds, callback) {
            const timerDisplay = document.getElementById('timerDisplay');
            let remaining = seconds;
            
            const interval = setInterval(() => {
                timerDisplay.textContent = `⏳ ${remaining}s`;
                if (remaining <= 0) {
                    clearInterval(interval);
                    timerDisplay.textContent = '';
                    callback();
                }
                remaining--;
            }, 1000);
        }

        // ==================== UNLOCK STEPS ====================
        function startStep1() {
            currentStep = 2;
            updateSteps(2);
            
            const btn = document.getElementById('actionBtn');
            const status = document.getElementById('modalStatus');
            
            hideLoader();
            status.innerHTML = '<b>📢 පියවර 1/3:</b><br>පළමු දැන්වීම නරඹන්න.';
            btn.textContent = 'දැන්වීම බලන්න →';
            btn.onclick = () => {
                window.open(AD_LINK_1, '_blank');
                showLoader('⏳ මීළඟ පියවර සූදානම් වේ...');
                runTimer(5, startStep2);
            };
        }

        function startStep2() {
            currentStep = 3;
            updateSteps(3);
            
            const btn = document.getElementById('actionBtn');
            const status = document.getElementById('modalStatus');
            
            hideLoader();
            status.innerHTML = '<b>🎬 පියවර 2/3:</b><br>දෙවන දැන්වීම නරඹන්න.';
            btn.textContent = 'දැන්වීම බලන්න →';
            btn.onclick = () => {
                window.open(AD_LINK_2, '_blank');
                showLoader('⏳ සත්‍යාපනය වේ...');
                runTimer(3, startStep3);
            };
        }

        function startStep3() {
            const btn = document.getElementById('actionBtn');
            const status = document.getElementById('modalStatus');
            
            hideLoader();
            status.innerHTML = '<b>✅ පියවර 3/3:</b><br>වීඩියෝව ලබා ගැනීමට පහත බොත්තම ඔබන්න.';
            btn.textContent = '🎬 වීඩියෝව ලබා ගන්න';
            btn.onclick = finalStep;
        }

        function finalStep() {
            const btn = document.getElementById('actionBtn');
            const status = document.getElementById('modalStatus');
            const successMsg = document.getElementById('successMessage');
            
            // Mark as unlocked
            unlockedEpisodes.add(currentEpisode.toString());
            saveUnlockedEpisodes();
            
            // Update UI
            const epCard = document.getElementById(`ep-${currentEpisode}`);
            if (epCard) {
                epCard.classList.add('unlocked');
                epCard.querySelector('.ep-status').textContent = 'UNLOCKED';
            }
            
            // Format episode ID for bot
            const epIdToSend = `EP${String(currentEpisode).padStart(2, '0')}`;
            
            status.innerHTML = '<span style="color:var(--neon)">✨ සාර්ථකයි!</span><br>දැන් වීඩියෝව නරඹන්න.';
            successMsg.style.display = 'block';
            btn.textContent = '📺 වීඩියෝව බලන්න';
            btn.onclick = () => {
                console.log('Sending to bot:', { action: 'get_video', ep_id: epIdToSend });
                
                // Send to Telegram bot
                tg.sendData(JSON.stringify({
                    action: 'get_video',
                    ep_id: epIdToSend
                }));
                
                btn.textContent = '⏳ යවමින්...';
                btn.disabled = true;
                
                setTimeout(() => {
                    tg.close();
                }, 1000);
            };
        }

        // ==================== INITIALIZE ====================
        window.addEventListener('load', () => {
            generateEpisodes();
            console.log('Mini App loaded successfully');
        });

        // Handle back button
        tg.BackButton.onClick(() => {
            if (document.getElementById('adModal').style.display === 'flex') {
                closeModal();
            } else {
                tg.close();
            }
        });
    </script>
</body>
</html>
